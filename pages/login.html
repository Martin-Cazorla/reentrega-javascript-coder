<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | KaijuStream</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<!--Cuerpo de la página con clase para background-->
<body class="bg-home-login">

<!--Contenedor del formulario-->
    <main class="login-container">
<!--Datos dentro del formulario de Login-->
        <form id="login-form">
            <h2>Ingresar</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Contraseña" required>
<!--botón para entrar-->
            <button type="submit" class="btn-kaiju">Entrar</button>
<!--botón volver-->
            <div class="login-footer-links">
                <a href="../index.html" class="btn-link">Volver</a>
            </div>

        </form>
    </main>
<!---->
    <script src="../js/login.js"></script>

</body>
</html>
